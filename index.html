<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>VM Tabell</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    table {
      border-collapse: collapse;
      width: 60%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f2f2f2;
    }
  </style>
</head>
<body>

<h1>VM 2026 Tabell</h1>

<table>
  <thead>
    <tr>
      <th>Land</th>
      <th>Namn</th>
      <th>Poäng</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰"
};

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text
      .trim()
      .split("\n")
      .slice(1);

    const data = rows
      .map(r => r.split(";").map(x => x.trim()))
      .filter(r =>
        r.length === 3 &&
        !r[0].includes("#N/A") &&
        r[0] !== ""
      )
      .map(([land, namn, poäng]) => ({
        land,
        namn,
        poäng: Number(poäng)
      }));

    data.sort((a, b) => b.poäng - a.poäng);

    const tbody = document.getElementById("table");
    tbody.innerHTML = "";

    data.forEach(r => {
      const flag = flagMap[r.land] || "🏳️";

      tbody.innerHTML += `
        <tr>
          <td>${flag} ${r.land}</td>
          <td>${r.namn}</td>
          <td>${r.poäng}</td>
        </tr>
      `;
    });

  })
  .catch(err => {
    console.error("Kunde inte läsa CSV:", err);
  });
</script>

</body>
</html>
