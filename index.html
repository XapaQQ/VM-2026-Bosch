<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>VM Tabell</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #fafafa;
    }

    h1 {
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 75%;
      background: white;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ZEBRA */
    tbody tr:nth-child(even) {
      background: #f6f6f6;
    }

    tbody tr:hover {
      background: #eaf2ff;
    }

    /* LAND */
    table th:first-child,
    table td:first-child {
      width: 60px;
      text-align: center;
    }

    /* NAMN TAR RESTEN */
    .nameCol {
      width: auto;
    }

    /* SMÅ KOLUMNER */
    .todayCol {
      width: 45px;
      text-align: center;
      font-size: 13px;
    }

    .placeCol {
      width: 45px;
      text-align: center;
      font-size: 13px;
    }

    .pointsCol {
      width: 55px;
      text-align: center;
      font-size: 13px;
    }

    /* STATUSBOX */
    #statusBox {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      width: fit-content;
      border-radius: 8px;
    }

    /* 🥇 TOP 3 - EXTRA FETT */
    .gold {
      background: linear-gradient(to right, #fff7cc, #fff2a8);
      border-left: 8px solid gold;
      font-weight: 900;
      box-shadow: 0 0 12px rgba(255,215,0,0.6);
      transform: scale(1.01);
    }

    .silver {
      background: linear-gradient(to right, #f5f5f5, #e5e5e5);
      border-left: 8px solid silver;
      font-weight: 900;
      box-shadow: 0 0 10px rgba(180,180,180,0.5);
    }

    .bronze {
      background: linear-gradient(to right, #f7dfcf, #edc2a7);
      border-left: 8px solid #cd7f32;
      font-weight: 900;
      box-shadow: 0 0 10px rgba(205,127,50,0.5);
    }

    /* PLACERING */
    .up { color: green; font-weight: bold; }
    .down { color: red; font-weight: bold; }
    .same { color: goldenrod; font-weight: bold; }

  </style>
</head>

<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">⏳ Laddar senaste uppdatering...</div>

<table>
  <thead>
    <tr>
      <th>Land</th>
      <th>Namn</th>
      <th>Dagens Poäng</th>
      <th>Placering</th>
      <th>Poäng</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<script>

const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰"
};

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text
      .replace(/\r/g, "")
      .trim()
      .split("\n")
      .slice(1);

    const data = rows
      .map(r => r.split(/[;,]/).map(x => x.trim()))
      .filter(r =>
        r.length >= 5 &&
        r[0] !== "" &&
        !r[0].includes("#N/A")
      )
      .map(cols => ({
        land: cols[0],
        namn: cols[1],
        poäng: Number(cols[2]),
        dagenspoäng: Number(cols[3]),
        placering: Number(cols[4])
      }));

    data.sort((a, b) => b.poäng - a.poäng);

    const tbody = document.getElementById("table");
    tbody.innerHTML = "";

    data.forEach((r, index) => {

      const flag = flagMap[r.land] || "🏳️";

      let medal = "";
      if (index === 0) medal = "🥇";
      else if (index === 1) medal = "🥈";
      else if (index === 2) medal = "🥉";

      let placementIcon = "";
      let placementClass = "";

      if (r.placering > 0) {
        placementIcon = "▲";
        placementClass = "up";
      } else if (r.placering < 0) {
        placementIcon = "▼";
        placementClass = "down";
      } else {
        placementIcon = "◆";
        placementClass = "same";
      }

      tbody.innerHTML += `
        <tr class="${index < 3 ? (index === 0 ? 'gold' : index === 1 ? 'silver' : 'bronze') : ''}">
          <td>${flag}</td>

          <td class="nameCol">
            ${medal} ${r.namn}
          </td>

          <td class="todayCol">
            ${r.dagenspoäng}
          </td>

          <td class="placeCol ${placementClass}">
            ${placementIcon} ${r.placering}
          </td>

          <td class="pointsCol">
            ${r.poäng}
          </td>
        </tr>
      `;
    });

  })
  .catch(err => {
    console.error("Kunde inte läsa CSV:", err);
  });

fetch("https://api.github.com/repos/XapaQQ/VM-2026-Bosch/commits")
  .then(res => res.json())
  .then(data => {

    const date = new Date(data[0].commit.committer.date);

    const formatted = date.toLocaleString("sv-SE", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" + formatted + "</b>";

  })
  .catch(() => {
    document.getElementById("statusBox").innerHTML =
      "⚠️ Kunde inte hämta uppdatering";
  });

</script>

</body>
</html>
