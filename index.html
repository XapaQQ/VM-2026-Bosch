<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>VM Tabell</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #fafafa;
    }

    h1 {
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 75%;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    /* LAND-KOLUMN */

    table th:first-child,
    table td:first-child {
      width: 55px;
      text-align: center;
    }

    .countryCell {
      font-size: 28px;
      color: #f2f2f2;
    }

    /* STATUSBOX */

    #statusBox {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      width: fit-content;
      border-radius: 8px;
    }

    /* TOP 3 */

    .gold {
      background: linear-gradient(to right, #fff7cc, #fff2a8);
      border-left: 8px solid gold;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(255,215,0,0.4);
    }

    .silver {
      background: linear-gradient(to right, #f5f5f5, #e5e5e5);
      border-left: 8px solid silver;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(180,180,180,0.4);
    }

    .bronze {
      background: linear-gradient(to right, #f7dfcf, #edc2a7);
      border-left: 8px solid #cd7f32;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(205,127,50,0.4);
    }

    /* PLACERING */

    .up {
      color: green;
      font-weight: bold;
    }

    .down {
      color: red;
      font-weight: bold;
    }

    .same {
      color: goldenrod;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">
  ⏳ Laddar senaste uppdatering...
</div>

<table>
  <thead>
    <tr>
      <th>Land</th>
      <th>Namn</th>
      <th>Dagens Poäng</th>
      <th>Placering</th>
      <th>Poäng</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<script>

const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰"
};

// ─────────────────────────────
// LÄS CSV OCH BYGG TABELL
// ─────────────────────────────

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text
      .trim()
      .split("\n")
      .slice(1);

    const data = rows
      .map(r => r.split(/[;,]/).map(x => x.trim()))
      .filter(r =>
        r.length === 5 &&
        !r[0].includes("#N/A") &&
        r[0] !== ""
      )
      .map(([land, namn, poäng, dagenspoäng, placering]) => ({
        land,
        namn,
        poäng: Number(poäng),
        dagenspoäng: Number(dagenspoäng),
        placering: Number(placering)
      }));

    // Sortera högst poäng först
    data.sort((a, b) => b.poäng - a.poäng);

    const tbody = document.getElementById("table");
    tbody.innerHTML = "";

    data.forEach((r, index) => {

      const flag = flagMap[r.land] || "🏳️";

      let medalClass = "";

      if (index === 0) medalClass = "gold";
      else if (index === 1) medalClass = "silver";
      else if (index === 2) medalClass = "bronze";

      const medal =
        index === 0 ? "🥇" :
        index === 1 ? "🥈" :
        index === 2 ? "🥉" : "";

      let placementIndicator = "";
      let placementClass = "";

      if (r.placering > 0) {
        placementIndicator = "▲";
        placementClass = "up";
      }
      else if (r.placering < 0) {
        placementIndicator = "▼";
        placementClass = "down";
      }
      else {
        placementIndicator = "◆";
        placementClass = "same";
      }

      tbody.innerHTML += `
        <tr class="${medalClass}">
          <td class="countryCell">${flag}</td>
          <td>${medal} ${r.namn}</td>
          <td>${r.dagenspoäng}</td>
          <td class="${placementClass}">
            ${placementIndicator} ${r.placering}
          </td>
          <td>${r.poäng}</td>
        </tr>
      `;
    });

  })
  .catch(err => {
    console.error("Kunde inte läsa CSV:", err);
  });


// ─────────────────────────────
// STATUSBOX
// ─────────────────────────────

fetch("https://api.github.com/repos/XapaQQ/VM-2026-Bosch/commits")
  .then(res => res.json())
  .then(data => {

    const date = new Date(data[0].commit.committer.date);

    const formatted = date.toLocaleString("sv-SE", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" + formatted + "</b>";

  })
  .catch(() => {

    document.getElementById("statusBox").innerHTML =
      "⚠️ Kunde inte hämta uppdatering";

  });

</script>

</body>
</html>
