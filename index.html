<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VM Grid Tabell</title>

<style>

:root {
  --row-height: 44px;
}

body {
  font-family: Arial, sans-serif;
  margin: 30px;
  background: #fafafa;
}

h1 {
  margin-bottom: 10px;
}

/* STATUS */
#statusBox {
  padding: 8px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  background: #f7f7f7;
  width: fit-content;
  border-radius: 8px;
  font-size: 14px;
}

/* LAYOUT */
.tables {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

/* MAIN */
.table-main {
  width: 800px;
}

/* MEDALS */
.table-medals {
  width: 520px;
}

/* MAIN GRID */
.header,
.row {
  display: grid;
  grid-template-columns: 88px 275px 140px 100px 112px;
  align-items: center;
}

.header > div,
.row > div {
  box-sizing: border-box;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  overflow: hidden;
  white-space: nowrap;
}

.header {
  font-weight: bold;
  background: #f2f2f2;
  border: 1px solid #ddd;
}

.row {
  border: 1px solid #ddd;
  background: white;
  height: var(--row-height);
  min-height: var(--row-height);
  max-height: var(--row-height);
}

.row:nth-child(even) {
  background: #f6f6f6;
}

/* TOP 3 */
.gold, .silver, .bronze {
  position: relative;
}

.gold::before {
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;width:5px;
  background: gold;
}
.silver::before {
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;width:5px;
  background: silver;
}
.bronze::before {
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;width:5px;
  background: #cd7f32;
}

/* FLAG */
.flag {
  font-size: 22px;
}

/* MEDAL TABLE */
.medals-header,
.medal-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: stretch;
  height: var(--row-height);
  min-height: var(--row-height);
}

.medals-header {
  font-weight: bold;
  background: #f2f2f2;
  border: 1px solid #ddd;
}

.medal-row {
  border: 1px solid #ddd;
  background: white;
}

.medal-row:nth-child(even) {
  background: #f6f6f6;
}

.medal-row > div,
.medals-header > div {
  padding: 6px 10px;
  display: flex;
  align-items: center;
  white-space: nowrap;
}

/* separators */
.medal-row > div:not(:last-child),
.medals-header > div:not(:last-child) {
  border-right: 1px solid #e0e0e0;
}

</style>
</head>

<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">⏳ Laddar...</div>

<div class="tables">

  <!-- MAIN -->
  <div class="table-main">

    <div class="header">
      <div>Land</div>
      <div>Namn</div>
      <div>Dagens Poäng</div>
      <div>Placering</div>
      <div>Total Poäng</div>
    </div>

    <div id="grid"></div>

  </div>

  <!-- MEDALS -->
  <div class="table-medals">

    <div class="medals-header">
      <div>Gold</div>
      <div>Silver</div>
      <div>Bronze</div>
    </div>

    <div id="medalGrid"></div>

  </div>

</div>

<script>

/* FLAGS MAIN */
const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰",
  Brazil: "🇧🇷",
  Brasil: "🇧🇷"
};

/* FLAGS MEDALS */
const countryFlagMap = {
  SWEDEN: "🇸🇪",
  BRAZIL: "🇧🇷",
  ARGENTINA: "🇦🇷",
  FRANCE: "🇫🇷",
  SPAIN: "🇪🇸",
  ENGLAND: "🇬🇧",
  GERMANY: "🇩🇪",
  PORTUGAL: "🇵🇹",
  URUGUAY: "🇺🇾",
  NETHERLANDS: "🇳🇱"
};

/* MAIN RENDER */
function render(data) {

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach((r, i) => {

    const row = document.createElement("div");

    const cls =
      i === 0 ? "row gold" :
      i === 1 ? "row silver" :
      i === 2 ? "row bronze" :
      "row";

    const placeIcon =
      r.placering > 0 ? "▲" :
      r.placering < 0 ? "▼" :
      "◆";

    row.className = cls;

    row.innerHTML = `
      <div class="flag">${flagMap[r.land] || "🏳️"}</div>
      <div>${r.namn}</div>
      <div>${r.dagenspoäng}</div>
      <div>${placeIcon} ${r.placering}</div>
      <div>${r.poäng}</div>
    `;

    grid.appendChild(row);
  });
}

/* MEDAL RENDER */
function renderMedals(data) {

  const grid = document.getElementById("medalGrid");
  grid.innerHTML = "";

  data.forEach(r => {

    const row = document.createElement("div");
    row.className = "medal-row";

    const gold = countryFlagMap[r.gold?.toUpperCase()] || "🏳️";
    const silver = countryFlagMap[r.silver?.toUpperCase()] || "🏳️";
    const bronze = countryFlagMap[r.bronze?.toUpperCase()] || "🏳️";

    row.innerHTML = `
      <div>${gold} ${r.gold}</div>
      <div>${silver} ${r.silver}</div>
      <div>${bronze} ${r.bronze}</div>
    `;

    grid.appendChild(row);
  });

}

/* LOAD DATA */
fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text.trim().split("\n").slice(1);

    const data = rows.map(r => {
      const c = r.split(";").map(x => x.trim());

      return {
        land: c[0],
        namn: c[1],
        poäng: Number(c[2]),
        dagenspoäng: Number(c[3]),
        placering: Number(c[4]),
        gold: c[5],
        silver: c[6],
        bronze: c[7]
      };
    });

    data.sort((a, b) => b.poäng - a.poäng);

    render(data);
    renderMedals(data);

  });

/* STATUS */
fetch("https://api.github.com/repos/XapaQQ/VM-2026-Bosch/commits")
  .then(r => r.json())
  .then(data => {

    const date = new Date(data[0].commit.committer.date);

    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" +
      date.toLocaleString("sv-SE") +
      "</b>";

  });

</script>

</body>
</html>
