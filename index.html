<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VM Grid Tabell</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 30px;
  background: #fafafa;
}

h1 {
  margin-bottom: 10px;
}

#statusBox {
  padding: 8px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  background: #f7f7f7;
  width: fit-content;
  border-radius: 8px;
  font-size: 14px;
}

/* TVÅ TABELLER BREDVID VARANDRA */

.tables {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.table-main {
  width: 750px;
}

.table-medals {
  width: 240px;
}

/* HUVUDTABELL */

.header,
.row {
  display: grid;
  grid-template-columns: 88px 275px 140px 100px 112px;
  align-items: center;
}

.header > div,
.row > div {
  box-sizing: border-box;
  padding: 6px;
  overflow: hidden;
  text-align: center;
}

.header > div {
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
  line-height: 1.1;
  word-break: break-word;
}

.row > div {
  white-space: nowrap;
  text-overflow: ellipsis;
}

.header > div:nth-child(2),
.row > div:nth-child(2) {
  text-align: left;
}

.header {
  font-weight: bold;
  background: #f2f2f2;
  border: 1px solid #ddd;
}

.row {
  border: 1px solid #ddd;
  background: white;
  transition: background 0.15s ease;
}

.row:nth-child(even) {
  background: #f6f6f6;
}

.row:hover {
  background: #eaf2ff;
}

.row:nth-child(3) {
  border-bottom: 2px dashed rgba(0,0,0,0.45);
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

/* MEDALJTABELL */

.medals-header,
.medal-row {
  display: grid;
  grid-template-columns: 80px 80px 80px;
  align-items: center;
}

.medals-header {
  font-weight: bold;
  background: #f2f2f2;
  border: 1px solid #ddd;
}

.medals-header div,
.medal-row div {
  padding: 6px;
  text-align: center;
  box-sizing: border-box;
}

.medal-row {
  border: 1px solid #ddd;
  background: white;
  transition: background 0.15s ease;
}

.medal-row:nth-child(even) {
  background: #f6f6f6;
}

.medal-row:hover {
  background: #eaf2ff;
}

.medal-row:nth-child(3) {
  border-bottom: 2px dashed rgba(0,0,0,0.45);
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

/* FLAGS */

.flag {
  text-align: left;
  font-size: 28px;
  padding-left: 6px;
}

/* TEXT */

.name {
  font-size: 14px;
}

.today,
.place,
.points {
  font-size: 14px;
  font-weight: 500;
}

/* TOP 3 */

.gold,
.silver,
.bronze {
  position: relative;
}

.gold::before,
.silver::before,
.bronze::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
}

.gold::before {
  background: gold;
}

.silver::before {
  background: silver;
}

.bronze::before {
  background: #cd7f32;
}

/* PLACERING */

.up {
  color: green;
  font-weight: bold;
}

.down {
  color: red;
  font-weight: bold;
}

.same {
  color: goldenrod;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">
  ⏳ Laddar senaste uppdatering...
</div>

<div class="tables">

  <!-- HUVUDTABELL -->

  <div class="table-main">

    <div class="header">
      <div>Land</div>
      <div>Namn</div>
      <div>Dagens Poäng</div>
      <div>Placering</div>
      <div>Total Poäng</div>
    </div>

    <div id="grid"></div>

  </div>

  <!-- MEDALJTABELL -->

  <div class="table-medals">

    <div class="medals-header">
      <div>Gold</div>
      <div>Silver</div>
      <div>Bronze</div>
    </div>

    <div id="medalGrid"></div>

  </div>

</div>

<script>

const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰",
  Brazil: "🇧🇷",
  Brasil: "🇧🇷"
};

function render(data) {

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach((r, i) => {

    const row = document.createElement("div");

    const cls =
      i === 0 ? "row gold" :
      i === 1 ? "row silver" :
      i === 2 ? "row bronze" :
      "row";

    const placeIcon =
      r.placering > 0 ? "▲" :
      r.placering < 0 ? "▼" :
      "◆";

    const placeClass =
      r.placering > 0 ? "up" :
      r.placering < 0 ? "down" :
      "same";

    row.className = cls;

    row.innerHTML = `
      <div class="flag">${flagMap[r.land] || "🏳️"}</div>
      <div class="name">${r.namn}</div>
      <div class="today">${r.dagenspoäng}</div>
      <div class="place ${placeClass}">
        ${placeIcon} ${r.placering}
      </div>
      <div class="points">${r.poäng}</div>
    `;

    grid.appendChild(row);
  });
}

function renderMedals(data) {

  const grid = document.getElementById("medalGrid");
  grid.innerHTML = "";

  data.forEach(() => {

    const row = document.createElement("div");
    row.className = "medal-row";

    row.innerHTML = `
      <div></div>
      <div></div>
      <div></div>
    `;

    grid.appendChild(row);

  });
}

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text
      .trim()
      .split("\n")
      .slice(1);

    const data = rows.map(r => {

      const c = r.split(";").map(x => x.trim());

      return {
        land: c[0],
        namn: c[1],
        poäng: Number(c[2]),
        dagenspoäng: Number(c[3]),
        placering: Number(c[4]),
        gold: c[5] || "",
        silver: c[6] || "",
        bronze: c[7] || ""
      };

    });

    data.sort((a, b) => b.poäng - a.poäng);

    render(data);

    const medalGrid = document.getElementById("medalGrid");
    medalGrid.innerHTML = "";

    data.forEach((r, i) => {

      const row = document.createElement("div");
      row.className = "medal-row";

      if (i === 2) {
        row.style.borderBottom = "2px dashed rgba(0,0,0,0.45)";
        row.style.boxShadow = "0 4px 6px rgba(0,0,0,0.05)";
      }

      row.innerHTML = `
        <div>${r.gold}</div>
        <div>${r.silver}</div>
        <div>${r.bronze}</div>
      `;

      medalGrid.appendChild(row);

    });

  })
  .catch(err => {
    console.error("Kunde inte läsa CSV:", err);
  });

fetch("https://api.github.com/repos/XapaQQ/VM-2026-Bosch/commits")
  .then(r => r.json())
  .then(data => {

    const date = new Date(data[0].commit.committer.date);

    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" +
      date.toLocaleString("sv-SE") +
      "</b>";

  })
  .catch(() => {

    document.getElementById("statusBox").innerHTML =
      "⚠️ Kunde inte hämta uppdatering";

  });

</script>

</body>
</html>
