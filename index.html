<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>VM Tabell</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    table {
      border-collapse: collapse;
      width: 60%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f2f2f2;
    }

    #statusBox {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      width: fit-content;
    }
  </style>
</head>
<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">⏳ Laddar senaste uppdatering...</div>

<table>
  <thead>
    <tr>
      <th>Land</th>
      <th>Namn</th>
      <th>Poäng</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰"
};

// ─────────────────────────────
// LÄS CSV OCH BYGG TABELL
// ─────────────────────────────

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text
      .trim()
      .split("\n")
      .slice(1);

    const data = rows
      .map(r => r.split(/[;,]/).map(x => x.trim()))
      .filter(r =>
        r.length === 3 &&
        !r[0].includes("#N/A") &&
        r[0] !== ""
      )
      .map(([land, namn, poäng]) => ({
        land,
        namn,
        poäng: Number(poäng)
      }));

    data.sort((a, b) => b.poäng - a.poäng);

    const tbody = document.getElementById("table");
    tbody.innerHTML = "";

    data.forEach(r => {
      const flag = flagMap[r.land] || "🏳️";

      tbody.innerHTML += `
        <tr>
          <td>${flag} ${r.land}</td>
          <td>${r.namn}</td>
          <td>${r.poäng}</td>
        </tr>
      `;
    });

  })
  .catch(err => {
    console.error("Kunde inte läsa CSV:", err);
  });


// ─────────────────────────────
// STATUSBOX (SENAST UPPDATERAD)
// ─────────────────────────────

fetch("https://api.github.com/repos/DITT-USER/DITT-REPO/commits?path=data.csv")
  .then(res => res.json())
  .then(data => {

    const date = new Date(data[0].commit.committer.date);

    const formatted = date.toLocaleString("sv-SE", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" + formatted + "</b>";
  })
  .catch(() => {
    document.getElementById("statusBox").innerHTML =
      "⚠️ Kunde inte hämta uppdatering";
  });

</script>

</body>
</html>
