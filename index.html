<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VM Grid Tabell</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 30px;
  background: #fafafa;
}

h1 {
  margin-bottom: 10px;
}

/* STATUS */
#statusBox {
  padding: 8px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  background: #f7f7f7;
  width: fit-content;
  border-radius: 8px;
  font-size: 14px;
}

/* 🔥 FIX: fast grid som aldrig drifter */
#grid, .header {
  width: 600px;
  max-width: 95vw;
}

/* 🔥 IDENTISK GRID FÖR HEADER + ROW */
.header, .row {
  display: grid;
  grid-template-columns: 70px 220px 80px 80px 90px;
  align-items: center;
}

/* 🔥 CRITICAL: samma boxmodell överallt */
.header > div,
.row > div {
  box-sizing: border-box;
  padding: 6px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* ALIGN */
.header > div,
.row > div {
  text-align: center;
}

/* namn vänster */
.header > div:nth-child(2),
.row > div:nth-child(2) {
  text-align: left;
}

/* HEADER */
.header {
  font-weight: bold;
  background: #f2f2f2;
  border: 1px solid #ddd;
}

/* ROW */
.row {
  border: 1px solid #ddd;
  background: white;
}

/* ZEBRA */
.row:nth-child(even) {
  background: #f6f6f6;
}

/* HOVER */
.row:hover {
  background: #eaf2ff;
}

/* FLAGGOR */
.flag {
  text-align: left;
  font-size: 26px;
  padding-left: 6px;
}

/* NAMN */
.name {
  font-size: 14px;
}

/* DATA */
.today, .place, .points {
  font-size: 14px;
  font-weight: 500;
}

/* TOP 3 */
.gold {
  border-left: 5px solid gold;
  font-weight: bold;
}

.silver {
  border-left: 5px solid silver;
  font-weight: bold;
}

.bronze {
  border-left: 5px solid #cd7f32;
  font-weight: bold;
}

/* PLACERING */
.up { color: green; font-weight: bold; }
.down { color: red; font-weight: bold; }
.same { color: goldenrod; font-weight: bold; }

</style>
</head>

<body>

<h1>VM 2026 Tabell</h1>

<div id="statusBox">⏳ Laddar senaste uppdatering...</div>

<!-- HEADER -->
<div class="header">
  <div>Land</div>
  <div>Namn</div>
  <div>Dagens Poäng</div>
  <div>Placering</div>
  <div>Total Poäng</div>
</div>

<!-- DATA -->
<div id="grid"></div>

<script>

const flagMap = {
  Sweden: "🇸🇪",
  Germany: "🇩🇪",
  Austria: "🇦🇹",
  Ukraine: "🇺🇦",
  India: "🇮🇳",
  "United States": "🇺🇸",
  Denmark: "🇩🇰"
};

function render(data) {

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach((r, i) => {

    const row = document.createElement("div");

    const cls =
      i === 0 ? "row gold" :
      i === 1 ? "row silver" :
      i === 2 ? "row bronze" : "row";

    let placeIcon =
      r.placering > 0 ? "▲" :
      r.placering < 0 ? "▼" : "◆";

    let placeClass =
      r.placering > 0 ? "up" :
      r.placering < 0 ? "down" : "same";

    row.className = cls;

    row.innerHTML = `
      <div class="flag">${flagMap[r.land] || ""}</div>
      <div class="name">${r.namn}</div>
      <div class="today">${r.dagenspoäng}</div>
      <div class="place ${placeClass}">${placeIcon} ${r.placering}</div>
      <div class="points">${r.poäng}</div>
    `;

    grid.appendChild(row);
  });
}

fetch("data.csv")
  .then(res => res.text())
  .then(text => {

    const rows = text.trim().split("\n").slice(1);

    const data = rows.map(r => {
      const c = r.split(";").map(x => x.trim());
      return {
        land: c[0],
        namn: c[1],
        poäng: Number(c[2]),
        dagenspoäng: Number(c[3]),
        placering: Number(c[4])
      };
    });

    data.sort((a, b) => b.poäng - a.poäng);

    render(data);

  });

fetch("https://api.github.com/repos/XapaQQ/VM-2026-Bosch/commits")
  .then(r => r.json())
  .then(data => {
    const date = new Date(data[0].commit.committer.date);
    document.getElementById("statusBox").innerHTML =
      "🕒 Senast uppdaterad: <b>" +
      date.toLocaleString("sv-SE") +
      "</b>";
  });

</script>

</body>
</html>
